<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SE4BXZT3WW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SE4BXZT3WW');

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    window.addEventListener('load', function() {
      const qrId = getParam('utm_content');

      // GA4イベント送信
      gtag('event', 'qr_redirect', {
        qr_id: qrId
      });

      // Sheets記録＋メール通知
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbyuVZnPHZDIiA1m6zBl8--hrn__-eN7N84tTBNv_JOTMdjHP0DwasBnmM9dxUy2aYBLIg/exec';
      fetch(scriptUrl + '?qr_id=' + encodeURIComponent(qrId))
        .catch(function(){});

      // 跳转
      setTimeout(function(){
        window.location.href = "https://www.hommage-osc.co.jp/company/";
      }, 1500);
    });
  </script>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">
  <div>読み込み中...</div>
</body>
</html>
